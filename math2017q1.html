<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>2017 Math Q1</title>
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body {
      font-family: 'Times New Roman', serif;
      font-size: 18px;
      padding: 40px;
      background: white;
      max-width: 800px;
      margin: 0 auto;
    }
    .question {
      margin-bottom: 20px;
      font-weight: normal;
    }
    .options {
      margin-left: 20px;
    }
    .option {
      margin: 10px 0;
    }
    .label {
      font-weight: bold;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="question">
    <strong>1.</strong> Which one of the following function is NOT a power function?
  </div>
  <div class="options">
    <div class="option"><span class="label">A.</span> \(f(x) = x^{-3/5}\)</div>
    <div class="option"><span class="label">B.</span> \(f(x) = \sqrt{2} \cdot x^{3/2}\)</div>
    <div class="option"><span class="label">C.</span> \(f(x) = \pi x^{5}\)</div>
    <div class="option"><span class="label">D.</span> \(f(x) = (\sqrt{3})^{x}\)</div>
  </div>
</body>
</html>
